{% extends "base.html" %}

{% block content %}

<div class="admin-container">

    <!-- HEADER -->
    <div class="page-header">

        <div>
            <h2>Módulos</h2>
            <p class="page-subtitle">
                Gerencie os módulos do sistema
            </p>
        </div>

    </div>

    <!-- CARD -->
    <div class="admin-card">

        <!-- FORM NOVO MÓDULO -->
        <form method="POST" class="admin-form">

            <div class="form-grid">

                <div class="form-group">
                    <label>Código do módulo *</label>
                    <input name="codigo" required placeholder="Ex: ADMIN">
                </div>

                <div class="form-group">
                    <label>Descrição</label>
                    <input name="descricao" placeholder="Ex: Administração do sistema">
                </div>

            </div>

            <label class="checkbox-line">
                <input type="checkbox" name="ativo" value="S" checked>
                <span>Módulo ativo</span>
            </label>

            <div class="form-footer">
                <button class="btn-primary">
                    💾 Criar módulo
                </button>
            </div>

        </form>

    </div>

    <!-- LISTAGEM -->
    <div class="admin-card" style="margin-top:20px;">

        <h3 style="margin-bottom:10px;">Módulos cadastrados</h3>

        <table class="admin-table">

            <thead>
                <tr>
                    <th>Código</th>
                    <th>Descrição</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>
                {% for m in modulos %}
                <tr>
                    <td>{{ m.codigo }}</td>
                    <td>{{ m.descricao }}</td>
                    <td>
                        <span class="status {{ 'ativo' if m.ativo == 'S' else 'inativo' }}">
                            {{ 'Ativo' if m.ativo == 'S' else 'Inativo' }}
                        </span>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

</div>

{% endblock %}
