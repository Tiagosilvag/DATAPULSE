{% extends "base.html" %}

{% block content %}
<div class="admin-page">

    <h2>Cadastro de Estruturas</h2>

    <form method="POST" class="admin-form">

        <div class="form-group">
            <label>Nome da Estrutura</label>
            <input type="text" name="nome" placeholder="Ex: B2B, B2C" required>
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" name="ativo" value="S" checked>
                Estrutura ativa
            </label>
        </div>

        <button type="submit" class="btn-primary">
            Cadastrar estrutura
        </button>

    </form>

    <hr style="margin:30px 0;">

    <table class="admin-table">
        <thead>
            <tr>
                <th>Estrutura</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for e in estruturas %}
            <tr>
                <td>{{ e.nome }}</td>
                <td>{{ 'Ativa' if e.ativo == 'S' else 'Inativa' }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>
{% endblock %}
