<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login - DATAPULSE</title>

    <!-- LUCIDE -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/login.css') }}">
</head>

<body class="page-login" data-theme="dark">

    <div class="login-container">

        <!-- HERO -->
        <div class="login-hero">
            <div class="hero-content">

                <!-- ✅ LOGO PREMIUM -->
                <div class="logo-login">
                    <i data-lucide="box" class="logo-icon"></i>

                    <div class="logo-text">
                        <span class="logo-title">DATAPULSE</span>
                    </div>
                </div>

                <h1>
                    Monitoramento inteligente <br>
                    de processos
                </h1>

                <p>
                    Acompanhe, valide e garanta a qualidade dos dados
                    com eficiência e segurança.
                </p>

                <div class="hero-logo">
                    <img src="{{ url_for('static', filename='img/Vivo+Vivinho_RGB_H_2020V1.png') }}">
                </div>

            </div>
        </div>

        <!-- FORM -->
        <div class="login-panel">

            <div class="login-card">

                <!-- THEME -->
                <label class="theme-switch">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider">
                        <i data-lucide="sun" class="icon sun"></i>
                        <i data-lucide="moon" class="icon moon"></i>
                    </span>
                </label>

                <h2>
                    <i data-lucide="log-in" class="icon"></i>
                    Acesse sua conta
                </h2>

                <form method="POST">

                    <div class="input-group">
                        <i data-lucide="user" class="input-icon"></i>
                        <input type="text" name="login" placeholder="Usuário" required>
                    </div>

                    <div class="input-group">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input type="password" id="senha" name="senha" placeholder="Senha" required>
                        <span class="toggle-password" onclick="toggleSenha()"></span>
                    </div>

                    <div class="form-options">
                        <label>
                            <input type="checkbox">
                            Lembrar‑me
                        </label>

                        <a href="#" class="forgot">Esqueci minha senha</a>
                    </div>

                    <button type="submit" id="loginBtn" class="btn-login">
                        <span>Entrar</span>
                    </button>

                </form>

                <p class="login-help">
                    Não tem acesso?
                    <span>Fale com o administrador.</span>
                </p>

            </div>

        </div>

    </div>

    <!-- JS LOGIN -->
    <script src="{{ url_for('static', filename='js/pages/login.js') }}"></script>

    <!-- ✅ ATIVA ÍCONES -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            lucide.createIcons();
        });
    </script>

</body>

</html>
