{% extends "admin/base_admin.html" %}

{% block header %}👤 Novo Usuário{% endblock %}

{% block content %}

<div class="admin-container">

    <div class="page-header">
        <h2>Novo Usuário</h2>
        <p class="page-subtitle">
            Preencha as informações e permissões
        </p>
    </div>

    <div class="admin-card form-card">

        <form method="POST" class="admin-form" id="formUsuario" novalidate>

            <div class="form-section">

                <div class="form-grid">

                    <div class="form-group">
                        <label for="login">Login</label>
                        <input type="text" id="login" name="login" required>

                        <div id="erro-login" class="input-error" style="display:none;">
                            Informe o login
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="nome" required>

                        <div id="erro-nome" class="input-error" style="display:none;">
                            Informe o nome
                        </div>
                    </div>

                </div>

                <label class="checkbox-line">
                    <input type="checkbox" id="ativo" name="ativo" value="S" checked>
                    <span>Usuário ativo</span>
                </label>

            </div>

            <!-- PERFIS -->
            <div class="form-section">

                <span class="section-title">Perfis do usuário *</span>

                <div id="erro-perfis" class="input-error" style="display:none;">
                    Selecione pelo menos um perfil
                </div>

                <div class="module-grid">
                    {% for p in perfis %}
                    <label class="module-card">

                        <input type="checkbox" name="perfis" value="{{ p.id_perfil }}">

                        <div class="module-content">
                            <span class="module-title">{{ p.ds_perfil }}</span>
                            <span class="module-desc">
                                {{ p.ds_descricao or 'Perfil de acesso' }}
                            </span>
                        </div>

                    </label>
                    {% endfor %}
                </div>

            </div>

            <!-- AÇÕES -->
            <div class="form-footer">

                <button type="submit" class="btn-primary">
                    💾 Criar usuário
                </button>

                <a href="{{ url_for('admin_usuarios_bp.listar') }}" class="btn-secondary">
                    Cancelar
                </a>

            </div>

        </form>

    </div>

</div>


<script src="{{ url_for('static', filename='js/pages/form.js') }}"></script>

{% endblock %}
