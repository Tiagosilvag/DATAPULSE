{% extends "base.html" %}

{% block content %}

<div class="rv-layout">

    <!-- SIDEBAR -->
    <aside class="rv-sidebar">

        <div class="sidebar-content">

            <!-- LOGO -->
            <div class="sidebar-logo">
                <i data-lucide="zap" class="icon icon-purple"></i>
                DATAPULSE
            </div>

            <!-- MENU -->
            <nav class="sidebar-menu">

                <a href="{{ url_for('home_bp.dashboard') }}" class="sidebar-item sidebar-back">
                    <i data-lucide="arrow-left" class="icon icon-gray"></i>
                    Voltar aos módulos
                </a>

                <a href="{{ url_for('rv_bp.index') }}"
                    class="sidebar-item {% if request.endpoint == 'rv_bp.index' %}active{% endif %}">
                    <i data-lucide="layout-dashboard" class="icon icon-blue"></i>
                    Dashboard
                </a>

                <a href="{{ url_for('rv_bp.checklist') }}"
                    class="sidebar-item {% if request.endpoint == 'rv_bp.checklist' %}active{% endif %}">
                    <i data-lucide="check-square" class="icon icon-green"></i>
                    Checklist
                </a>

                <a href="#" class="sidebar-item">
                    <i data-lucide="clock" class="icon icon-yellow"></i>
                    Provisão
                </a>

                <a href="#" class="sidebar-item">
                    <i data-lucide="activity" class="icon icon-blue"></i>
                    Monitoramento
                </a>

                <a href="#" class="sidebar-item">
                    <i data-lucide="file-text" class="icon icon-gray"></i>
                    Logs
                </a>

            </nav>

            <!-- FOOTER -->
            <div class="sidebar-footer">
                <a href="{{ url_for('auth_bp.logout') }}" class="sidebar-logout">
                    <i data-lucide="log-out" class="icon icon-red"></i>
                    Sair
                </a>
            </div>

        </div>

    </aside>

    <!-- MAIN -->
    <div class="rv-main">

        <!-- HEADER -->
        <header class="rv-header">

            <div class="header-left">
                <i data-lucide="bar-chart-3" class="icon icon-blue"></i>
                RV & Data Quality
            </div>

            <div class="header-right">

                <!-- THEME -->
                <div class="theme-toggle" id="themeToggleBtn">
                    <i data-lucide="sun" class="icon"></i>
                    <i data-lucide="moon" class="icon"></i>
                </div>

                <!-- USER -->
                <div class="user-box">
                    <div class="avatar"></div>
                    <div class="user-info">
                        <span class="user-name">{{ current_user.login }}</span>
                    </div>
                </div>

            </div>

        </header>

        <!-- CONTENT -->
        <main class="rv-content">
            {% block rv_content %}{% endblock %}
        </main>

    </div>

</div>

<!-- THEME SCRIPT -->
<script>
    document.addEventListener("DOMContentLoaded", function () {

        const toggleBtn = document.getElementById("themeToggleBtn");
        const body = document.body;

        if (!toggleBtn) return; // evita erro

        // carregar tema salvo
        if (localStorage.getItem("theme") === "light") {
            body.setAttribute("data-theme", "light");
        }

        // clique
        toggleBtn.addEventListener("click", () => {

            if (body.getAttribute("data-theme") === "light") {
                body.removeAttribute("data-theme");
                localStorage.setItem("theme", "dark");
            } else {
                body.setAttribute("data-theme", "light");
                localStorage.setItem("theme", "light");
            }

        });

    });

</script>

{% endblock %}
